syntax = "proto3";

package user.v1;

option go_package = "github.com/ivannnnnik/sr-proto/gen/go/user/v1;userv1";

// Models

message User {
  string id = 1;
  string email = 2;
  string username = 3;
  string created_at = 4;
}

// Request / Response

message RegisterRequest {
  string email = 1;
  string username = 2;
  string password = 3;
}

message RegisterResponse {
  User user = 1;
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message LoginResponse {
  string access_token = 1;
  User user = 2;
}

message GetProfileRequest {
  string user_id = 1;
}

message GetProfileResponse {
  User user = 1;
}

// Service

service UserService {
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc Login(LoginRequest) returns (LoginResponse);
  rpc GetProfile(GetProfileRequest) returns (GetProfileResponse);
}
